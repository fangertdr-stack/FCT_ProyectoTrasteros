<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fin contrato</title>

  <style>
  * {
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;

    /* 🔥 fondo consistente SaaS */
    background: #eef2ee;

    display: flex;
    align-items: center;
    justify-content: center;

    min-height: 100vh;
    padding: 20px;
  }

  /* ========================= */
  /* CARD */
  /* ========================= */

  .contenedor {
    width: 100%;
    max-width: 520px;

    background: #ffffff;
    padding: 42px 32px;
    border-radius: 22px;

    text-align: center;

    box-shadow:
      0 30px 60px rgba(0,0,0,.15),
      0 10px 25px rgba(0,0,0,.08),
      inset 0 1px 0 rgba(255,255,255,.6);

    animation: fadeInUp .4s ease;
  }

  /* ========================= */
  /* ICONO */
  /* ========================= */

  .check {
    font-size: 54px;
    color: #4ead53;
    margin-bottom: 12px;

    /* 🔥 pequeño glow moderno */
    text-shadow: 0 10px 30px rgba(78,173,83,.25);
  }

  /* ========================= */
  /* TITULO */
  /* ========================= */

  h1 {
    font-size: clamp(22px, 5vw, 26px);
    color: #243124;
    margin-bottom: 12px;
    font-weight: 600;
  }

  /* ========================= */
  /* TEXTO */
  /* ========================= */

  p {
    font-size: 15px;
    color: #5e665d;
    margin-bottom: 22px;
    line-height: 1.5;
  }

  /* ========================= */
  /* BUTTON */
  /* ========================= */

  button {
    padding: 13px 20px;

    border-radius: 12px;
    border: none;

    background: #4ead53;
    color: white;

    font-size: 14px;
    font-weight: 500;

    cursor: pointer;
    transition: all .2s ease;
  }

  button:hover {
    background: #43c56e;
    transform: translateY(-1px);
  }

  /* ========================= */
  /* ANIMATION */
  /* ========================= */

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(15px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ========================= */
  /* RESPONSIVE */
  /* ========================= */

  @media (max-width: 480px) {
    .contenedor {
      padding: 30px 22px;
      border-radius: 18px;
    }

    button {
      width: 100%;
      padding: 14px;
    }
  }
</style>
</head>

<body>

<div class="contenedor">

  <div class="check">✔</div>

  <h1>¡Contrato firmado!</h1>

  <p>Cierra esta ventana y continúa con el pago de tu trastero.</p>

  <button onclick="window.close()">Cerrar</button>

</div>

</body>
</html>
