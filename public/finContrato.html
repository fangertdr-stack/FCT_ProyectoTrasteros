<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fin contrato</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #5a5752, #0b3b0f);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* CARD */

    .contenedor {
      width: 100%;
      max-width: 500px;
      background: #f9faf8;
      padding: 40px 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow:
        0 20px 40px rgba(0,0,0,.35),
        0 0 0 1px rgba(255,255,255,.25);
      animation: fadeInUp .5s ease;
    }

    /* ICONO */

    .check {
      font-size: 50px;
      color: #4ead53;
      margin-bottom: 10px;
    }

    /* TITULO */

    h1 {
      font-size: clamp(22px, 5vw, 26px);
      color: #243124;
      margin-bottom: 12px;
    }

    /* TEXTO */

    p {
      font-size: 15px;
      color: #5e665d;
      margin-bottom: 20px;
    }

    /* BOTÓN */

    button {
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      background: #4ead53;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all .25s ease;
    }

    button:hover {
      background: #43c56e;
    }

    /* ANIMACION */

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* RESPONSIVE */

    @media (max-width: 480px) {
      .contenedor {
        padding: 30px 20px;
        border-radius: 16px;
      }

      p {
        font-size: 14px;
      }

      button {
        width: 100%;
        padding: 14px;
      }
    }

  </style>
</head>

<body>

<div class="contenedor">

  <div class="check">✔</div>

  <h1>¡Contrato firmado!</h1>

  <p>Cierra esta ventana y continúa con el pago de tu trastero.</p>

  <button onclick="window.close()">Cerrar</button>

</div>

</body>
</html>
