<div class="main-page">

  <!-- HEADER -->
  <header class="main-header">
    <div class="logo">
      🟩 TrasteRush
    </div>

    <nav class="nav-buttons">
      <button class="nav-btn ghost" (click)="rent()">contratar</button>
      <button class="nav-btn ghost">Contacto</button>

      @if (!isLoggedIn) {
        <button class="nav-btn primary" (click)="login()">
          Login
        </button>
    } @else {
      <button class="nav-btn ghost" (click)="admin()">Admin</button>
      <span class="nav-welcome">
          Hola, <strong>{{ nombrePublico }}</strong>
      </span>

      <button class="nav-btn danger" (click)="logout()">
        Logout
      </button>

    }

    </nav>
  </header>

  <!-- hero -->
  <section class="hero-banner">
  <div class="hero-overlay"></div>

  <div class="hero-container">

    <!-- IZQUIERDA -->
    <div class="hero-left">
      <h1>Alquila tu trastero 100% online</h1>
      <p>Sin visitas, sin papeles, sin complicaciones.</p>

      <!-- FEATURES -->
      <div class="hero-features">
        <span>✔ Acceso inmediato</span>
        <span>✔ Contrato digital</span>
        <span>✔ Pago seguro</span>
      </div>
    </div>

    <!-- DERECHA -->
    <div class="hero-right">
      <img
        src="https://storemore.es/wp-content/uploads/2026/02/servicio-de-mudanzas-storemore-alquiler-de-trasteros-1.webp"
        alt="Trasteros"
      />
    </div>

  </div>
</section>

</div>
