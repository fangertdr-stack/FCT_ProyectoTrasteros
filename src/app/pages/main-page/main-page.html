<div class="main-page">

  <!-- HEADER -->
  <header class="main-header">
    <div class="logo">
      🟩 TrasteRush
    </div>

    <nav class="nav-buttons">
      <button class="nav-btn ghost" (click)="rent()">contratar</button>
      <button class="nav-btn ghost" (click)="contact()">Contactos</button>

      @if (!isLoggedIn) {
        <button class="nav-btn primary" (click)="login()">
          Login
        </button>
      } @else {
        <button class="nav-btn ghost" (click)="admin()">Admin</button>

        <button class="nav-welcome" (click)="userPage()">
          Hola, <strong>{{ nombrePublico }}</strong>
        </button>

        <button class="nav-btn danger" (click)="logout()">
          Logout
        </button>
      }
    </nav>
  </header>


  <!-- HERO -->
  <section class="hero-banner">

    <div class="hero-overlay"></div>

    <div class="hero-container">

      <div class="hero-left">
        <h1>Alquila tu trastero 100% online</h1>
        <p>Sin visitas, sin papeles, sin complicaciones.</p>

        <div class="hero-features">
          <span>✔ Acceso inmediato</span>
          <span>✔ Contrato digital</span>
          <span>✔ Pago seguro</span>
        </div>
      </div>

      <div class="hero-right">
        <img
          src="/assets/img/fondo1.png"
          alt="Trasteros" 
        />
      </div>

    </div>

  </section>


  <!-- TRASTEROS -->
  <section class="trasteros-section">

    <div class="trasteros-container">

      <!-- PEQUEÑO -->
      <div class="trastero-item">

        <span class="label">Pequeño</span>

        <div class="trastero" (click)="contratar()">
          <div class="puerta"></div>
        </div>

      </div>

      <!-- MEDIANO -->
      <div class="trastero-item">

        <span class="label">Mediano</span>

        <div class="trastero mediano" (click)="contratar()">
          <div class="puerta"></div>
        </div>

      </div>

      <!-- GRANDE -->
      <div class="trastero-item">

        <span class="label">Grande</span>

        <div class="trastero grande" (click)="contratar()">
          <div class="puerta"></div>
        </div>

      </div>

    </div>

  </section>

</div>
