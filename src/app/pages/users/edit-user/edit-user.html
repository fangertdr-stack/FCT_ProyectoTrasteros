<div class="modal-overlay" (click)="cancelarEdicion()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h3>Editar Usuario: {{ usuario.nombre }}</h3>

    <form (ngSubmit)="guardarCambios()">
      <div class="form-group">
        <label>Nombre:</label>
        <input [(ngModel)]="usuario.nombre" name="nombre" required />
      </div>

      <div class="form-group">
        <label>Email:</label>
        <input [(ngModel)]="usuario.email" name="email" type="email" required />
      </div>

      <div class="form-group">
        <label>Dirección:</label>
        <input [(ngModel)]="usuario.direccion" name="direccion" type="text" required />
      </div>

      <div class="form-group">
        <label>Teléfono:</label>
        <input [(ngModel)]="usuario.telefono" name="telefono" type="text" required />
      </div>

      <div class="form-group">
        <label>Rol:</label>
        <select [(ngModel)]="usuario.rol" name="rol" required>
          <option [value]="0">Usuario</option>
          <option [value]="1">Administrador</option>
        </select>
      </div>

      <div class="modal-buttons">
        <button type="submit">Guardar</button>
        <button type="button" (click)="cancelarEdicion()">Cancelar</button>
      </div>
    </form>
  </div>
</div>
