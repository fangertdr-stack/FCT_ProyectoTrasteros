<br>
<h1>Usuarios Registrados</h1>
<table class="table">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Email</th>
      <th>DNI</th>
      <th>Teléfono</th>
      <th>Dirección</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let user of usuario">
      <td>{{ user.id_usuario }}</td>
      <td>{{ user.nombre }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.dni }}</td>
      <td>{{ user.telefono }}</td>
      <td>{{ user.direccion }}</td>
    </tr>
    <button>Editar Usuario</button>
    <button>Borrar Usuario</button>
  </tbody>
</table>
