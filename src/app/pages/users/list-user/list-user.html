<h2>Lista de Usuarios</h2>

<table>
  <tr>
    <th>ID</th>
    <th>Nombre</th>
    <th>Email</th>

    <th>Acciones</th>
  </tr>
  <tr *ngFor="let user of usuario$ | async">
    <td>{{ user.id_usuario }}</td>
    <td>{{ user.nombre }}</td>

    <td>{{ user.email }}</td>

    <td>
      <button (click)="editarUsuario(user)">Editar</button>
    </td>
  </tr>
</table>

<!-- Modal de edición -->
<div *ngIf="editVisible" class="modal-overlay"  (click)="cancelarEdicion()" >
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h3>Editar Usuario: {{ usuarioEditando?.nombre }}</h3>
    <form (ngSubmit)="guardarCambios()" >
      <div class="form-group">
        <label>Nombre:</label>
        <input [(ngModel)]="usuarioEditando!.nombre" name="nombre" required />
      </div>

      <div class="form-group">
        <label>Email:</label>
        <input [(ngModel)]="usuarioEditando!.email" name="email" type="email" required />
      </div>

      <div class="modal-buttons">
        <button type="submit">Guardar</button>
        <button type="button" (click)="cancelarEdicion()">Cancelar</button>
      </div>
    </form>
  </div>
</div>
