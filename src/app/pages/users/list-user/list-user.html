<div style="width: 90%; margin: 20px auto; display: flex; align-items: center;">
  <button class="btn-volver" (click)="volver()">← Volver</button>
  <h1 class="titulo" style="margin-left: 190px;">Gestión de Usuarios</h1>
</div>
<button (click)="abrirAgregarUsuario()">+</button>
<table>

  <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Email</th>
      <th>DNI</th>
      <th>Rol</th>
      <th>Dirección</th>
      <th>Teléfono</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let user of usuario$ | async">
      <td>{{user.id_usuario}}</td>
      <td>{{user.nombre}}</td>
      <td>{{user.email}}</td>
      <td>{{user.dni}}</td>
      <td>{{ user.rol == 0 ? 'Usuario' : 'Administrador' }}</td>
      <td>{{user.direccion}}</td>
      <td>{{user.telefono}}</td>
      <td>
        <button class="btn-editar" (click)="editarUsuario(user)">Editar</button>
        <button class="btn-eliminar" (click)="abrirEliminarUsuario(user)">Eliminar</button>

      </td>
    </tr>
  </tbody>
</table>

<!-- Modal agregar -->
<app-add-user
  *ngIf="agregarVisible"
  (agregado)="onUsuarioAgregado()"
  (cancel)="cancelarAgregar()">
</app-add-user>

<!-- Modal de edición -->
<app-edit-user
  *ngIf="editVisible && usuarioEditando"
  [usuario]="usuarioEditando"
  (guardado)="onUsuarioGuardado()"
  (cancel)="cancelarEdicion()">
</app-edit-user>

<!-- Modal de eliminación -->
<app-delete-user
  *ngIf="eliminarVisible && usuarioEliminando"
  [usuario]="usuarioEliminando"
  (eliminado)="onUsuarioEliminado()"
  (cancel)="cancelarEliminar()">
</app-delete-user>
