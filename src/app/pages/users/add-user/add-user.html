<div class="modal-overlay" (click)="cancelar()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h3>Agregar Nuevo Usuario</h3>

    <form (ngSubmit)="agregarUsuario()">
      <div class="form-group">
        <label>Nombre:</label>
        <input [(ngModel)]="nuevoUsuario.nombre" name="nombre" required />
      </div>

      <div class="form-group">
        <label>Email:</label>
        <input [(ngModel)]="nuevoUsuario.email" name="email" type="email" required />
      </div>

      <div class="form-group">
        <label>Contraseña:</label>
        <input [(ngModel)]="nuevoUsuario.password" name="nombre" required />
      </div>

      <div class="form-group">
        <label>DNI:</label>
        <input [(ngModel)]="nuevoUsuario.dni" name="dni" type="text" required />
      </div>

      <div class="form-group">
        <label>Dirección:</label>
        <input [(ngModel)]="nuevoUsuario.direccion" name="direccion" type="text" />
      </div>

      <div class="form-group">
        <label>Teléfono:</label>
        <input [(ngModel)]="nuevoUsuario.telefono" name="telefono" type="text" />
      </div>

      <div class="form-group">
        <label>Rol:</label>
        <select [(ngModel)]="nuevoUsuario.rol" name="rol" required>
          <option [value]="0">Usuario</option>
          <option [value]="1">Administrador</option>
        </select>
      </div>

      <div class="modal-buttons">
        <button type="submit">Agregar</button>
        <button type="button" (click)="cancelar()">Cancelar</button>
      </div>
    </form>
  </div>
</div>
